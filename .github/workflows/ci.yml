name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PNPM_CACHE_FOLDER: .pnpm-store
  HUSKY: 0

jobs:
  setup:
    name: 📦 Setup & Cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      cache-hit: ${{ steps.cache-deps.outputs.cache-hit }}
      pnpm-version: ${{ steps.pnpm-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📌 Get pnpm version
        id: pnpm-version
        run: echo "version=$(jq -r '.packageManager' package.json | cut -d'@' -f2)" >> $GITHUB_OUTPUT

      - name: 🔍 Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            deps:
              - 'package.json'
              - 'pnpm-lock.yaml'
            src:
              - 'src/**'
            config:
              - '*.config.*'
              - 'tsconfig.json'

      - name: 💾 Cache pnpm store
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-v2-${{ runner.os }}-

      - name: 🔧 Setup pnpm
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.pnpm-version.outputs.version }}

      - name: 🔧 Setup Node.js
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: 📦 Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile --prefer-offline

  commitlint:
    name: 🚩 Commitlint
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 💾 Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: 📦 Install dependencies
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile

      - name: 🚩 Validate commits
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 💾 Cache Gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: ~/bin/gitleaks
          key: gitleaks-8.18.2 # gitleaks:allow

      - name: 📥 Download Gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar -xz -C ~/bin gitleaks
          chmod +x ~/bin/gitleaks

      - name: 🛡️ Gitleaks Scan
        run: ~/bin/gitleaks detect --log-opts="-1" --verbose --no-git

  lint:
    name: 👕 Lint
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 💾 Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-v2-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile

      - name: 👕 Restore ESLint cache
        uses: actions/cache/restore@v4
        with:
          path: .eslintcache
          key: eslint-v2-${{ runner.os }}-${{ hashFiles('eslint.config.mjs') }}-${{ hashFiles('src/**/*.ts') }}
          restore-keys: |
            eslint-v2-${{ runner.os }}-${{ hashFiles('eslint.config.mjs') }}-

      - name: 👕 Run ESLint
        run: pnpm lint --cache --cache-location .eslintcache

      - name: 💾 Save ESLint cache
        if: always() && hashFiles('.eslintcache') != ''
        uses: actions/cache/save@v4
        with:
          path: .eslintcache
          key: eslint-v2-${{ runner.os }}-${{ hashFiles('eslint.config.mjs') }}-${{ hashFiles('src/**/*.ts') }}

  typecheck:
    name: 📋 Type Check
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 💾 Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: 📦 Install dependencies
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile

      - name: 💾 Restore TypeScript cache
        uses: actions/cache/restore@v4
        with:
          path: tsconfig.tsbuildinfo
          key: typescript-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts') }}

      - name: 📋 Type Check
        run: pnpm check:types

      - name: 💾 Save TypeScript cache
        if: always() && hashFiles('tsconfig.tsbuildinfo') != ''
        uses: actions/cache/save@v4
        with:
          path: tsconfig.tsbuildinfo
          key: typescript-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src/**/*.ts') }}

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 💾 Restore dependencies cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-v2-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile

      - name: 🏗️ Build
        run: pnpm build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 💾 Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-v2-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile

      - name: 🛡️ Run audit
        run: pnpm audit --audit-level=high

  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 💾 Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-v2-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile

      - name: 🧪 Run tests
        run: pnpm test:coverage
        env:
          NODE_ENV: test

      - name: 📤 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  sonarqube:
    name: 🦇 SonarQube
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: 💾 Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}-cache
          restore-keys: |
            sonar-${{ runner.os }}-

      - name: 🦇 SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  mutation-testing:
    name: 👽 Mutation Testing
    needs: [setup, lint, typecheck, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ needs.setup.outputs.pnpm-version }}

      - name: 💾 Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PNPM_CACHE_FOLDER }}
          key: pnpm-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-v2-${{ runner.os }}-

      - name: 📦 Install dependencies
        run: |
          pnpm config set store-dir ${{ env.PNPM_CACHE_FOLDER }}
          pnpm install --frozen-lockfile

      - name: 💾 Cache Stryker
        uses: actions/cache@v4
        with:
          path: .stryker-tmp
          key: stryker-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 👽 Stryker Mutation
        run: pnpm test:mutate
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
